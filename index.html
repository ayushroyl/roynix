<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROYNIX - Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background Particles -->
    <div class="particle" style="top: 10%; left: 20%; animation-delay: 0s;"></div>
    <div class="particle" style="top: 30%; left: 70%; animation-delay: 2s;"></div>
    <div class="particle" style="top: 60%; left: 40%; animation-delay: 4s;"></div>
    <div class="particle" style="top: 80%; left: 10%; animation-delay: 6s;"></div>

    <!-- Main Container -->
    <div class="container">
        <h1>ROYNIX</h1>
        <h2>Something amazing is launching soon!</h2>
        <!-- Countdown Timer -->
        <div id="countdown">
            <div>
                <span id="days">00</span>
                <p>Days</p>
            </div>
            <div>
                <span id="hours">00</span>
                <p>Hours</p>
            </div>
            <div>
                <span id="minutes">00</span>
                <p>Minutes</p>
            </div>
            <div>
                <span id="seconds">00</span>
                <p>Seconds</p>
            </div>
        </div>
        <!-- Notify Button -->
        <button id="notify">Notify Me</button>
    </div>

    <!-- Footer -->
    <footer>
        © 2024 ROYNIX | All rights reserved
    </footer>

    <!-- Countdown Script -->
    <script>
        const countdown = () => {
            const launchDate = new Date("2025-01-01T00:00:00").getTime();
            const now = new Date().getTime();
            const gap = launchDate - now;

            const second = 1000;
            const minute = second * 60;
            const hour = minute * 60;
            const day = hour * 24;

            const days = Math.floor(gap / day);
            const hours = Math.floor((gap % day) / hour);
            const minutes = Math.floor((gap % hour) / minute);
            const seconds = Math.floor((gap % minute) / second);

            document.getElementById("days").innerText = days < 10 ? `0${days}` : days;
            document.getElementById("hours").innerText = hours < 10 ? `0${hours}` : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? `0${minutes}` : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? `0${seconds}` : seconds;
        };

        setInterval(countdown, 1000);
    </script>
</body>
</html>
