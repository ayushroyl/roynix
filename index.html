<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roynix - Big Surprise Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #141414, #0f0f0f);
            color: #ffffff;
            overflow: hidden;
        }

        h1 {
            font-size: 4rem;
            text-transform: uppercase;
            color: #00ff7f;
            margin-top: 10vh;
            text-align: center;
            animation: pulse 2s infinite;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 300;
            text-align: center;
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.7);
        }

        .big-surprise {
            font-size: 2.5rem;
            color: #ff4500;
            text-align: center;
            margin: 50px 0;
            animation: flicker 1.5s infinite;
        }

        .countdown {
            display: flex;
            justify-content: center;
            margin: 40px 0;
        }

        .time {
            text-align: center;
            margin: 0 15px;
        }

        .time span {
            display: block;
            font-size: 3rem;
            font-weight: 700;
            color: #00ff7f;
            text-shadow: 0 0 10px #00ff7f;
        }

        .time p {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        /* Contact Section */
        .contact {
            margin: 40px auto;
            text-align: center;
        }

        .contact a {
            color: #00ff7f;
            text-decoration: none;
            font-weight: 500;
            margin: 0 10px;
            display: inline-block;
            font-size: 1.2rem;
            transition: color 0.3s ease;
        }

        .contact a:hover {
            color: #00cc66;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* Animations */
        @keyframes pulse {
            0% {
                text-shadow: 0 0 5px #00ff7f, 0 0 10px #00ff7f, 0 0 20px #00ff7f;
            }
            50% {
                text-shadow: 0 0 20px #00ff7f, 0 0 30px #00ff7f, 0 0 50px #00ff7f;
            }
            100% {
                text-shadow: 0 0 5px #00ff7f, 0 0 10px #00ff7f, 0 0 20px #00ff7f;
            }
        }

        @keyframes flicker {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
            100% {
                opacity: 1;
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
            100% {
                transform: translateY(0);
            }
        }

        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #00ff7f;
            border-radius: 50%;
            animation: float 6s infinite;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 3rem;
            }

            .time span {
                font-size: 2rem;
            }

            .contact a {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background Particles -->
    <div class="background">
        <div class="particle" style="top: 10%; left: 20%; animation-delay: 0s;"></div>
        <div class="particle" style="top: 30%; left: 70%; animation-delay: 1s;"></div>
        <div class="particle" style="top: 60%; left: 40%; animation-delay: 2s;"></div>
        <div class="particle" style="top: 80%; left: 10%; animation-delay: 3s;"></div>
    </div>

    <!-- Content -->
    <div class="container">
        <h1>ROYNIX</h1>
        <h2>Something big is coming your way!</h2>

        <div class="big-surprise">🎉 A BIG SURPRISE 🎉</div>

        <!-- Countdown Timer -->
        <div class="countdown" id="countdown">
            <div class="time">
                <span id="days">00</span>
                <p>Days</p>
            </div>
            <div class="time">
                <span id="hours">00</span>
                <p>Hours</p>
            </div>
            <div class="time">
                <span id="minutes">00</span>
                <p>Minutes</p>
            </div>
            <div class="time">
                <span id="seconds">00</span>
                <p>Seconds</p>
            </div>
        </div>

        <!-- Contact Information -->
        <div class="contact">
            <p>Contact us:</p>
            <p>Phone: <a href="tel:+917255071097">+917255071097</a> | Email: <a href="mailto:ayushroy0753@gmail.com">ayushroy0753@gmail.com</a></p>
            <p>Follow us:</p>
            <a href="https://instagram.com/ayushroyl" target="_blank">Instagram</a>
            <a href="https://facebook.com/ayushroyll" target="_blank">Facebook</a>
            <a href="https://twitter.com/ayushroyl" target="_blank">Twitter</a>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        © 2024 Roynix. All rights reserved.
    </footer>

    <!-- Countdown Script -->
    <script>
        const countdown = () => {
            const launchDate = new Date("2025-01-01T00:00:00").getTime();
            const now = new Date().getTime();
            const gap = launchDate - now;

            const second = 1000;
            const minute = second * 60;
            const hour = minute * 60;
            const day = hour * 24;

            const days = Math.floor(gap / day);
            const hours = Math.floor((gap % day) / hour);
            const minutes = Math.floor((gap % hour) / minute);
            const seconds = Math.floor((gap % minute) / second);

            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours;
            document.getElementById("minutes").innerText = minutes;
            document.getElementById("seconds").innerText = seconds;

            if (gap < 0) {
                document.getElementById("countdown").innerHTML = "<p>🎉 We're Live! 🎉</p>";
            }
        };

        setInterval(countdown, 1000);
    </script>
</body>
</html>
