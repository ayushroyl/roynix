<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roynix - Big Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: radial-gradient(circle, #0f2027, #203a43, #2c5364);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Main Section */
        .container {
            text-align: center;
            padding: 20px;
            width: 90%;
            max-width: 500px;
        }

        .title {
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            color: #00c6ff;
            animation: glow 1.5s infinite alternate;
        }

        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: rgba(255, 255, 255, 0.7);
        }

        .surprise {
            font-size: 1.8rem;
            margin-bottom: 40px;
            color: #ffcc00;
            animation: pulse 2s infinite;
        }

        /* Countdown Timer */
        .countdown {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
        }

        .time {
            flex: 1;
            text-align: center;
        }

        .time span {
            display: block;
            font-size: 2rem;
            font-weight: bold;
            color: #00c6ff;
            text-shadow: 0 0 10px #00c6ff;
        }

        .time p {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Contact Section */
        .contact {
            margin: 20px 0;
            text-align: center;
        }

        .contact p {
            margin-bottom: 10px;
        }

        .contact a {
            color: #00c6ff;
            text-decoration: none;
            font-weight: bold;
            margin: 0 10px;
            transition: color 0.3s ease;
        }

        .contact a:hover {
            color: #0096c7;
        }

        /* Background Animation */
        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #00c6ff;
            border-radius: 50%;
            animation: float 6s infinite linear;
        }

        /* Animations */
        @keyframes glow {
            from {
                text-shadow: 0 0 10px #00c6ff, 0 0 20px #00c6ff;
            }
            to {
                text-shadow: 0 0 20px #00c6ff, 0 0 30px #00c6ff;
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
            100% {
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .countdown {
                flex-direction: column;
            }

            .time {
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Particles -->
    <div class="background">
        <div class="particle" style="top: 10%; left: 20%; animation-delay: 0s;"></div>
        <div class="particle" style="top: 30%; left: 70%; animation-delay: 2s;"></div>
        <div class="particle" style="top: 60%; left: 40%; animation-delay: 4s;"></div>
        <div class="particle" style="top: 80%; left: 10%; animation-delay: 6s;"></div>
    </div>

    <!-- Content -->
    <div class="container">
        <h1 class="title">Roynix</h1>
        <p class="subtitle">Something Big Is Coming!</p>
        <div class="surprise">🎉 BIG SURPRISE 🎉</div>

        <!-- Countdown Timer -->
        <div class="countdown" id="countdown">
            <div class="time">
                <span id="days">00</span>
                <p>Days</p>
            </div>
            <div class="time">
                <span id="hours">00</span>
                <p>Hours</p>
            </div>
            <div class="time">
                <span id="minutes">00</span>
                <p>Minutes</p>
            </div>
            <div class="time">
                <span id="seconds">00</span>
                <p>Seconds</p>
            </div>
        </div>

        <!-- Contact Information -->
        <div class="contact">
            <p>Contact Us:</p>
            <p>Phone: <a href="tel:+917255071097">+91 7255071097</a></p>
            <p>Email: <a href="mailto:ayushroy0753@gmail.com">ayushroy0753@gmail.com</a></p>
            <p>Follow Us:</p>
            <a href="https://instagram.com/ayushroyl" target="_blank">Instagram</a>
            <a href="https://facebook.com/ayushroyll" target="_blank">Facebook</a>
            <a href="https://twitter.com/ayushroyl" target="_blank">Twitter</a>
        </div>
    </div>

    <!-- Countdown Script -->
    <script>
        const countdown = () => {
            const launchDate = new Date("2025-01-01T00:00:00").getTime();
            const now = new Date().getTime();
            const gap = launchDate - now;

            const second = 1000;
            const minute = second * 60;
            const hour = minute * 60;
            const day = hour * 24;

            const days = Math.floor(gap / day);
            const hours = Math.floor((gap % day) / hour);
            const minutes = Math.floor((gap % hour) / minute);
            const seconds = Math.floor((gap % minute) / second);

            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours;
            document.getElementById("minutes").innerText = minutes;
            document.getElementById("seconds").innerText = seconds;

            if (gap < 0) {
                document.getElementById("countdown").innerHTML = "<p>🎉 We're Live! 🎉</p>";
            }
        };

        setInterval(countdown, 1000);
    </script>
</body>
</html>
